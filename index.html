<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick IP Locator</title>
    
    <!-- LeafletJS Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #map {
            height: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>📍 Live IP Locator</h2>
        <p>Click the button below to locate your current public IP address details.</p>
        <button onclick="locateIP()">Find My IP</button>
        
        <div class="info-grid">
            <div><strong>IP Address:</strong> <span id="ip">-</span></div>
            <div><strong>Location:</strong> <span id="location">-</span></div>
            <div><strong>ISP/Org:</strong> <span id="org">-</span></div>
            <div><strong>Timezone:</strong> <span id="timezone">-</span></div>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>
</div>

<!-- LeafletJS Map JavaScript -->
<script src="https://unpkg.com"></script>

<script>
    // Initialize the map centered on a global view
    let map = L.map('map').setView([20, 0], 2);
    let marker;

    // Load OpenStreetMap graphic tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    async function locateIP() {
        try {
            // Fetch IP data using the free tier of IPinfo API
            const response = await fetch('https://ipinfo.io');
            if (!response.ok) throw new Error('Network issue');
            
            const data = await response.json();
            
            // Extract coordinates (IPinfo returns "lat,lng" as a single string)
            const coords = data.loc.split(',');
            const lat = parseFloat(coords[0]);
            const lng = parseFloat(coords[1]);

            // Update the UI text elements
            document.getElementById('ip').innerText = data.ip;
            document.getElementById('location').innerText = ${data.city}, ${data.region}, ${data.country};
            document.getElementById('org').innerText = data.org || 'N/A';
            document.getElementById('timezone').innerText = data.timezone;

            // Update map view and snap directly to the target location
            map.setView([lat, lng], 13);

            // Clear previous marker if it exists, then drop a new one
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lng]).addTo(map)
                .bindPopup(<b>Your IP Location</b><br>${data.city})
                .openPopup();

        } catch (error) {
            alert('Failed to fetch IP details. Try disabling any adblockers.');
            console.error(error);
        }
    }
</script>

</body>
</html>
